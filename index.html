<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalID · Investor Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0A0A12;--panel:#12121e;--panel-2:#171726;--line:#24243a;--line-soft:#1c1c2e;
    --text:#EDEDF7;--muted:#9a9ab5;--faint:#63637e;--violet:#8B5CF6;--cyan:#22D3EE;
    --grad:linear-gradient(120deg,#8B5CF6 0%,#22D3EE 100%);
    --ff-amt:#34d399;--ang-amt:#22D3EE;--warn:#f87171;--gold:#F5C563;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}
  body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;min-height:100vh;line-height:1.5}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(600px 400px at 12% -5%, rgba(139,92,246,.14), transparent 60%),
      radial-gradient(700px 500px at 100% 0%, rgba(34,211,238,.10), transparent 55%);}

  /* ---------- login ---------- */
  .auth-wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line-soft);
    border-radius:22px;padding:40px 34px;width:100%;max-width:400px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .auth-card .icon{height:66px;width:auto;margin:0 auto 18px;display:block}
  .auth-card h1{font-size:21px;font-weight:800;letter-spacing:-.5px}
  .auth-card .sub{font-size:13px;color:var(--faint);margin-top:5px;margin-bottom:24px}
  .auth-card label{display:block;text-align:left;font-size:11.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:.6px;color:var(--muted);margin-bottom:7px}
  .auth-card input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;
    padding:12px 14px;color:var(--text);font-family:inherit;font-size:14.5px;transition:.15s}
  .auth-card input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
  .auth-btn{width:100%;margin-top:16px;background:var(--grad);color:#0A0A12;font-family:inherit;font-weight:700;
    font-size:14.5px;border:none;border-radius:11px;padding:13px;cursor:pointer;transition:.16s}
  .auth-btn:hover{filter:brightness(1.08)}
  .auth-btn:disabled{opacity:.6;cursor:default}
  .auth-msg{margin-top:16px;font-size:13px;line-height:1.5;min-height:18px}
  .auth-msg.ok{color:#5fe0b0}
  .auth-msg.err{color:#f8a1a1}
  .auth-foot{margin-top:22px;font-size:11.5px;color:var(--faint)}

  .wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:24px 22px 70px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:15px}
  .logo-img{height:32px;width:auto;display:block}
  .brand-sep{width:1px;height:28px;background:var(--line)}
  .brand h1{font-size:18px;font-weight:700;letter-spacing:-.4px}
  .brand .sub{font-size:12px;color:var(--faint);font-weight:500}
  .head-actions{display:flex;align-items:center;gap:10px}
  .who{font-size:12px;color:var(--muted);margin-right:2px}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line-soft);border-radius:15px;padding:15px 17px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--faint);font-weight:600}
  .stat .v{font-size:25px;font-weight:800;letter-spacing:-.6px;margin-top:6px}
  .stat .v.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .stat .cap{font-size:12px;color:var(--muted);margin-top:2px}

  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{background:var(--panel);border:1px solid var(--line-soft);color:var(--muted);padding:10px 16px;border-radius:11px;
    font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:9px}
  .tab:hover{border-color:var(--line);color:var(--text)}
  .tab.active{background:var(--panel-2);border-color:transparent;color:var(--text);box-shadow:0 0 0 1.5px rgba(139,92,246,.5)}
  .tab .count{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
  .tab.active .count{background:var(--grad);color:#0A0A12}

  .funnel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .fchip{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line-soft);border-radius:10px;
    padding:6px 11px;font-size:12px;font-weight:600;color:var(--muted)}
  .fchip .dot{width:8px;height:8px;border-radius:50%}
  .fchip .fc{font-weight:800;color:var(--text)}
  .dot.contacted{background:#9a9ab5}.dot.interested{background:var(--violet)}.dot.soft_circled{background:var(--cyan)}
  .dot.committed{background:var(--ff-amt)}.dot.passed{background:var(--warn)}.dot.none{background:var(--faint)}

  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap}
  .panel-head .title{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .panel-head .desc{font-size:12.5px;color:var(--faint);margin-top:2px}
  .btn{font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;border-radius:10px;padding:9px 15px;border:1px solid transparent;
    transition:.16s;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--grad);color:#0A0A12}.btn-primary:hover{filter:brightness(1.08)}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--muted)}.btn-ghost:hover{color:var(--text);border-color:var(--faint)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line-soft);border-radius:16px;padding:18px;transition:.18s}
  .card:hover{border-color:var(--line);transform:translateY(-2px)}
  .card .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .card .name{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .card .org{font-size:12.5px;color:var(--cyan);font-weight:600;margin-top:1px}
  .card .contact-line{font-size:12px;color:var(--faint);margin-top:1px}
  .pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .pill.ff{background:rgba(52,211,153,.14);color:var(--ff-amt);border:1px solid rgba(52,211,153,.28)}
  .pill.angel{background:rgba(34,211,238,.13);color:var(--ang-amt);border:1px solid rgba(34,211,238,.28)}
  .pill.spv{background:rgba(139,92,246,.16);color:#c4b0fb;border:1px solid rgba(139,92,246,.3)}
  .pill.solo{background:rgba(245,197,99,.12);color:var(--gold);border:1px solid rgba(245,197,99,.28)}
  .amt-row{margin-top:15px;padding-top:14px;border-top:1px solid var(--line-soft);display:flex;align-items:baseline;gap:8px}
  .amt-row .amt{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .amt-row .amt.ff{color:var(--ff-amt)}.amt-row .amt.angel{color:var(--ang-amt)}
  .amt-row .amt.none{color:var(--faint);font-size:15px;font-weight:600}
  .amt-row .amt-label{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .stage-row{margin-top:13px;display:flex;align-items:center;gap:9px}
  .stage-row .sl{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
  .stage-select{font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;padding:5px 9px;
    background:var(--bg);color:var(--text);border:1px solid var(--line)}
  .stage-select.s-contacted{border-color:rgba(154,154,181,.5);color:#c7c7dd}
  .stage-select.s-interested{border-color:rgba(139,92,246,.55);color:#c4b0fb}
  .stage-select.s-soft_circled{border-color:rgba(34,211,238,.55);color:#7fe6f5}
  .stage-select.s-committed{border-color:rgba(52,211,153,.6);color:#5fe0b0}
  .stage-select.s-passed{border-color:rgba(248,113,113,.5);color:#f8a1a1}
  .terms{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .term{background:rgba(255,255,255,.035);border:1px solid var(--line-soft);border-radius:9px;padding:6px 10px;min-width:64px}
  .term .tl{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600}
  .term .tv{font-size:13.5px;font-weight:700;margin-top:1px}
  .card-actions{display:flex;gap:7px;margin-top:15px}
  .mini{font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;border-radius:8px;padding:6px 11px;
    border:1px solid var(--line-soft);background:transparent;color:var(--muted);transition:.15s}
  .mini:hover{color:var(--text);border-color:var(--faint)}
  .mini.del:hover{color:var(--warn);border-color:rgba(248,113,113,.4)}
  .empty{grid-column:1/-1;text-align:center;padding:48px 20px;border:1.5px dashed var(--line);border-radius:16px;color:var(--faint)}
  .empty .big{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .wl-list{display:flex;flex-direction:column;gap:10px}
  .wl-row{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line-soft);border-radius:13px;
    padding:14px 16px;display:flex;align-items:center;gap:14px}
  .wl-row .wl-name{font-size:15px;font-weight:700;flex:1;min-width:0}
  .wl-row .wl-name .wl-org{font-size:12px;color:var(--cyan);font-weight:600;display:block}
  .wl-row .wl-note{font-size:12.5px;color:var(--muted);flex:1.4;min-width:0}
  .wl-row .wl-actions{display:flex;gap:7px;align-items:center}
  .overlay{position:fixed;inset:0;background:rgba(5,5,10,.72);backdrop-filter:blur(6px);z-index:50;display:none;
    align-items:flex-start;justify-content:center;padding:32px 18px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;width:100%;max-width:540px;padding:26px;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .modal h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
  .modal .msub{font-size:12.5px;color:var(--faint);margin-bottom:20px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;color:var(--text);font-family:inherit;font-size:14px;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--violet)}
  .field textarea{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
  .close-x{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--faint);font-size:22px;cursor:pointer;line-height:1}
  .close-x:hover{color:var(--text)}
  .cond{transition:.2s}.hidden{display:none!important}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);
    border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 18px 50px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.25s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{border-color:rgba(248,113,113,.5);color:#f8a1a1}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--violet);border-radius:50%;
    animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:720px){.summary{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}.wl-row{flex-wrap:wrap}}
</style>
</head>

/* ---------- auth ---------- */
function showLogin(){$('appView').style.display='none';$('loginView').style.display='flex';}
function showApp(email){$('loginView').style.display='none';$('appView').style.display='block';$('who').textContent=email||'';}
function authMsg(msg,cls){const m=$('authMsg');m.textContent=msg;m.className='auth-msg'+(cls?(' '+cls):'');}

async function initAuth(){
  if(!window.supabase){authMsg('Could not load the sign-in library. Check your connection and refresh.','err');$('loginView').style.display='flex';return;}
  sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,detectSessionInUrl:true,autoRefreshToken:true}});
  sb.auth.onAuthStateChange((_e,session)=>{ route(session); });
  const {data:{session}}=await sb.auth.getSession();
  route(session);
}
async function route(session){
  if(!session){ showLogin(); return; }
  // confirm the signed-in email is on the board allowlist
  let allowed=true;
  try{ const {data:ok}=await sb.rpc('is_board_member'); allowed=(ok===true); }catch(e){ allowed=true; }
  if(!allowed){
    showLogin();
    authMsg('This account isn’t on the board access list. Ask Chris to add your email.','err');
    try{ await sb.auth.signOut(); }catch(e){}
    return;
  }
  showApp(session.user&&session.user.email);
  load();
}
$('sendLink').addEventListener('click',async()=>{
  const email=$('email').value.trim();
  if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){authMsg('Enter a valid email address.','err');return;}
  $('sendLink').disabled=true;authMsg('Sending…');
  const redirect=location.href.split('#')[0];
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:redirect}});
  $('sendLink').disabled=false;
  if(error){authMsg(error.message||'Could not send the link.','err');return;}
  authMsg('Check your email for a sign-in link from Supabase. Open it on this device.','ok');
});
$('email')&&$('email').addEventListener('keydown',e=>{if(e.key==='Enter')$('sendLink').click();});

/* ---------- data (supabase-js, uses the signed-in session token) ---------- */
async function apiGet(){const {data:rows,error}=await sb.from('investors').select('*').order('sort_order',{ascending:true}).order('created_at',{ascending:true});if(error)throw error;return rows||[];}
function recToRow(r){return {view:r.view,name:r.name,org:r.org,primary_contact:r.primary_contact,email:r.email,phone:r.phone,address:r.address,round:r.round,structure:r.structure,amount:r.amount,cap:r.cap,pct:r.pct,discount:r.discount,wishround:r.wishround,stage:r.stage,notes:r.notes,sort_order:r.sort_order};}

async function load(){
  $('content').innerHTML='<div class="empty"><div class="big"><span class="spin"></span>Loading contacts…</div></div>';
  try{ data=await apiGet(); }
  catch(e){ data=[]; $('content').innerHTML='<div class="empty"><div class="big" style="color:var(--warn)">Couldn’t load data</div>'+esc(e.message||e)+'</div>'; return; }
  render();
}

/* ---------- render ---------- */
function render(){
  const ff=data.filter(d=>d.view==='ff'),ang=data.filter(d=>d.view==='angel'),wish=data.filter(d=>d.view==='wish');
  $('c-ff').textContent=ff.length;$('c-angel').textContent=ang.length;$('c-wish').textContent=wish.length;
  const sum=a=>a.reduce((x,d)=>x+(Number(d.amount)||0),0);const ffT=sum(ff),angT=sum(ang);
  $('summary').innerHTML=`
    <div class="stat"><div class="k">F&amp;F Leads</div><div class="v">${ff.length}</div><div class="cap">${money(ffT)||'$0'} in play</div></div>
    <div class="stat"><div class="k">Angel / Inst.</div><div class="v">${ang.length}</div><div class="cap">${money(angT)||'$0'} in play</div></div>
    <div class="stat"><div class="k">Wish List</div><div class="v">${wish.length}</div><div class="cap">Target prospects</div></div>
    <div class="stat"><div class="k">Combined Pipeline</div><div class="v grad">${money(ffT+angT)||'$0'}</div><div class="cap">Considered, not committed</div></div>`;
  const titles={ff:['Friends &amp; Family','Active leads for the friends-and-family raise.'],angel:['Angel / Institutional','Institutional groups and angels in conversation.'],wish:['Wish List','Target prospects to reach out to.']};
  $('panelTitle').innerHTML=titles[currentView][0];$('panelDesc').innerHTML=titles[currentView][1];
  renderFunnel();
  const box=$('content'),list=data.filter(d=>d.view===currentView);
  if(currentView==='wish'){box.innerHTML=renderWish(list);return;}
  box.innerHTML=`<div class="cards">${list.length?list.map(card).join(''):emptyBlock()}</div>`;
}
function renderFunnel(){
  const list=data.filter(d=>d.view===currentView);const counts={};STAGES.forEach(s=>counts[s.v]=0);let unset=0;
  list.forEach(d=>{if(d.stage&&counts[d.stage]!=null)counts[d.stage]++;else unset++;});
  const chips=STAGES.map(s=>`<div class="fchip"><span class="dot ${s.v}"></span>${s.label} <span class="fc">${counts[s.v]}</span></div>`).join('');
  $('funnel').innerHTML=chips+(unset?`<div class="fchip"><span class="dot none"></span>Unset <span class="fc">${unset}</span></div>`:'');
}
function emptyBlock(){return `<div class="empty"><div class="big">No contacts yet</div>Click “Add contact” to start building this list.</div>`;}
function stageSelect(d){const cls=d.stage?('s-'+d.stage):'';const opts=['<option value="">— Set stage —</option>'].concat(STAGES.map(s=>`<option value="${s.v}" ${d.stage===s.v?'selected':''}>${s.label}</option>`)).join('');
  return `<div class="stage-row"><span class="sl">Stage</span><select class="stage-select ${cls}" onchange="quickStage('${d.id}',this.value)">${opts}</select></div>`;}
function card(d){
  const rc=d.round==='angel'?'angel':'ff';const rLabel=d.round==='angel'?'Angel':'F&amp;F';
  const structPill=d.round==='ff'&&d.structure?`<span class="pill ${d.structure==='spv'?'spv':'solo'}">${d.structure==='spv'?'SPV':'Solo'}</span>`:'';
  const contactBits=[d.email,d.phone].filter(Boolean).map(esc).join(' · ');
  const orgLine=d.org?`<div class="org">${esc(d.org)}</div>`:'';
  const primLine=(d.primary_contact&&d.primary_contact!==d.name)?`<div class="contact-line">Contact: ${esc(d.primary_contact)}</div>`:'';
  const contactLine=contactBits?`<div class="contact-line">${contactBits}</div>`:'';
  const terms=[];if(d.cap!=null&&d.cap!=='')terms.push(['Cap',money(d.cap)]);if(d.pct!=null&&d.pct!=='')terms.push(['Ownership',d.pct+'%']);if(d.discount!=null&&d.discount!=='')terms.push(['Discount',d.discount+'%']);
  const termsHtml=terms.length?`<div class="terms">${terms.map(t=>`<div class="term"><div class="tl">${t[0]}</div><div class="tv">${esc(t[1])}</div></div>`).join('')}</div>`:'';
  const amt=(d.amount!=null&&d.amount!=='')?`<span class="amt ${rc}">${money(d.amount)}</span><span class="amt-label">considered</span>`:`<span class="amt none">Amount TBD</span>`;
  const notes=d.notes?`<div class="contact-line" style="margin-top:12px;color:var(--muted)">${esc(d.notes)}</div>`:'';
  return `<div class="card"><div class="row1"><div style="min-width:0"><div class="name">${esc(d.name)}</div>${orgLine}${primLine}${contactLine}</div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end"><span class="pill ${rc}">${rLabel}</span>${structPill}</div></div>
    <div class="amt-row">${amt}</div>${stageSelect(d)}${termsHtml}${notes}
    <div class="card-actions"><button class="mini" onclick="edit('${d.id}')">Edit</button><button class="mini del" onclick="del('${d.id}')">Delete</button></div></div>`;
}
function renderWish(list){
  if(!list.length)return `<div class="cards">${emptyBlock()}</div>`;
  return `<div class="wl-list">${list.map(d=>{const tgt=d.wishround==='angel'?'angel':'ff';const tLabel=d.wishround==='angel'?'Angel':'F&amp;F';
    const org=d.org?`<span class="wl-org">${esc(d.org)}</span>`:'';const cls=d.stage?('s-'+d.stage):'';
    const opts=['<option value="">— Set stage —</option>'].concat(STAGES.map(s=>`<option value="${s.v}" ${d.stage===s.v?'selected':''}>${s.label}</option>`)).join('');
    return `<div class="wl-row"><div class="wl-name">${esc(d.name)}${org}</div><span class="pill ${tgt}">${tLabel} target</span>
      <div class="wl-note">${esc(d.notes||'')}</div><div class="wl-actions">
      <select class="stage-select ${cls}" onchange="quickStage('${d.id}',this.value)">${opts}</select>
      <button class="mini" onclick="edit('${d.id}')">Edit</button><button class="mini del" onclick="del('${d.id}')">Delete</button></div></div>`;}).join('')}</div>`;
}

window.quickStage=async(id,val)=>{
  const rec=data.find(d=>d.id===id);if(!rec)return;const prev=rec.stage;rec.stage=val||null;render();
  const {error}=await sb.from('investors').update({stage:rec.stage}).eq('id',id);
  if(error){rec.stage=prev;render();toast('Update failed: '+error.message,true);}else toast(val?('Stage → '+stageLabel(val)):'Stage cleared');
};

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentView=t.dataset.view;render();}));

function openModal(view,rec){
  $('f-view').value=view;$('modalTitle').textContent=rec?'Edit contact':'Add contact';
  $('cond-wishround').classList.toggle('hidden',view!=='wish');
  $('f-id').value=rec?rec.id:'';$('f-name').value=rec?rec.name:'';$('f-name').style.borderColor='';
  $('f-org').value=rec?(rec.org||''):'';$('f-primary').value=rec?(rec.primary_contact||''):'';
  $('f-email').value=rec?(rec.email||''):'';$('f-phone').value=rec?(rec.phone||''):'';$('f-address').value=rec?(rec.address||''):'';
  $('f-round').value=rec?rec.round:(view==='angel'?'angel':'ff');$('f-stage').value=rec&&rec.stage?rec.stage:'';
  $('f-structure').value=rec?(rec.structure||''):'';
  $('f-amount').value=rec&&rec.amount!=null?rec.amount:'';$('f-cap').value=rec&&rec.cap!=null?rec.cap:'';
  $('f-pct').value=rec&&rec.pct!=null?rec.pct:'';$('f-discount').value=rec&&rec.discount!=null?rec.discount:'';
  $('f-wishround').value=rec?(rec.wishround||'ff'):'ff';$('f-notes').value=rec?(rec.notes||''):'';
  toggleRoundFields();$('overlay').classList.add('show');
}
function toggleRoundFields(){const isWish=$('f-view').value==='wish';const round=$('f-round').value;$('cond-structure').classList.toggle('hidden',isWish||round!=='ff');}
$('f-round').addEventListener('change',toggleRoundFields);
function closeModal(){$('overlay').classList.remove('show')}
$('addBtn').addEventListener('click',()=>openModal(currentView,null));
$('closeX').addEventListener('click',closeModal);$('cancelBtn').addEventListener('click',closeModal);
$('overlay').addEventListener('click',e=>{if(e.target===$('overlay'))closeModal()});
$('signOut').addEventListener('click',async()=>{await sb.auth.signOut();data=[];showLogin();authMsg('');});
window.edit=id=>{const rec=data.find(d=>d.id===id);if(rec)openModal(rec.view,rec)};
window.del=async id=>{const rec=data.find(d=>d.id===id);if(!confirm(`Delete ${rec?rec.name:'this contact'}? This can’t be undone.`))return;
  const {error}=await sb.from('investors').delete().eq('id',id);if(error){toast('Delete failed: '+error.message,true);return;}
  data=data.filter(d=>d.id!==id);render();toast('Contact deleted');};

$('saveBtn').addEventListener('click',async()=>{
  const name=$('f-name').value.trim();if(!name){$('f-name').focus();$('f-name').style.borderColor='var(--warn)';return;}
  const view=$('f-view').value,id=$('f-id').value;
  const rec={view,name,org:$('f-org').value.trim(),primary_contact:$('f-primary').value.trim(),email:$('f-email').value.trim(),
    phone:$('f-phone').value.trim(),address:$('f-address').value.trim(),round:$('f-round').value,structure:$('f-structure').value,
    amount:numify($('f-amount').value),cap:numify($('f-cap').value),pct:numify($('f-pct').value),discount:numify($('f-discount').value),
    wishround:$('f-wishround').value,stage:$('f-stage').value||null,notes:$('f-notes').value.trim()};
  const btn=$('saveBtn');btn.disabled=true;
  try{
    if(id){const cur=data.find(d=>d.id===id)||{};const {data:row,error}=await sb.from('investors').update(recToRow({...rec,sort_order:cur.sort_order||0})).eq('id',id).select().single();
      if(error)throw error;const i=data.findIndex(d=>d.id===id);data[i]=row;}
    else{const maxO=data.reduce((m,d)=>Math.max(m,Number(d.sort_order)||0),0);const {data:row,error}=await sb.from('investors').insert(recToRow({...rec,sort_order:maxO+1})).select().single();
      if(error)throw error;data.push(row);}
  }catch(e){toast('Save failed: '+(e.message||e),true);btn.disabled=false;return;}
  btn.disabled=false;closeModal();render();toast(id?'Contact updated':'Contact added');
});

function csvCell(v){if(v==null)return '';const s=String(v);return /[",\r\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function exportCSV(){
  const cols=[['name','Name'],['view','List'],['round','Round'],['stage','Stage'],['structure','Structure'],['amount','Considered Amount'],['cap','Cap'],['pct','Ownership %'],['discount','Discount %'],['org','Organization'],['primary_contact','Primary Contact'],['email','Email'],['phone','Phone'],['address','Address'],['wishround','Wish Target'],['notes','Notes']];
  const vl={ff:'Friends & Family',angel:'Angel / Institutional',wish:'Wish List'};
  const head=cols.map(c=>csvCell(c[1])).join(',');
  const rows=data.map(d=>cols.map(c=>{let v=d[c[0]];if(c[0]==='view')v=vl[v]||v;if(c[0]==='round')v=v==='angel'?'Angel':'F&F';if(c[0]==='stage')v=stageLabel(v);return csvCell(v);}).join(','));
  const csv=[head,...rows].join('\r\n');const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');const d=new Date();const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.href=url;a.download='vitalid-investors-'+stamp+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Exported '+data.length+' contacts');
}
$('exportBtn').addEventListener('click',exportCSV);

initAuth();
</script>
</body>
</html>
